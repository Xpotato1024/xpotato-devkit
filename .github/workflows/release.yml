name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    env:
      DEVKIT_RELEASE_VERSION: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: devkit
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: devkit.exe
            archive_ext: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: devkit
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust/Cargo.lock') }}

      - name: Build
        working-directory: rust
        run: cargo build --locked --release --target ${{ matrix.target }} --package devkit-cli

      - name: Build Windows installer
        if: runner.os == 'Windows'
        working-directory: rust
        run: |
          cargo build --locked --release --target ${{ matrix.target }} --package devkit-installer --bin devkit-cleanup-helper
          $env:DEVKIT_INSTALLER_PAYLOAD = "${{ github.workspace }}/rust/target/${{ matrix.target }}/release/devkit.exe"
          $env:DEVKIT_CLEANUP_HELPER = "${{ github.workspace }}/rust/target/${{ matrix.target }}/release/devkit-cleanup-helper.exe"
          cargo build --locked --release --target ${{ matrix.target }} --package devkit-installer --bin devkit-installer

      - name: Package asset (Unix)
        if: runner.os != 'Windows'
        working-directory: rust
        shell: bash
        run: |
          mkdir -p ../dist
          tag="${GITHUB_REF_NAME}"
          asset_name="devkit-${tag}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          tar -czf "../dist/${asset_name}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary_name }}"

      - name: Package asset (Windows)
        if: runner.os == 'Windows'
        working-directory: rust
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assetName = "devkit-$tag-${{ matrix.target }}.${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Force ..\dist\bundle | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/devkit-installer.exe" "..\dist\bundle\devkit-installer.exe"
          Compress-Archive -Path "..\dist\bundle\devkit-installer.exe" -DestinationPath "..\dist\$assetName" -Force
          Remove-Item -Recurse -Force "..\dist\bundle"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
